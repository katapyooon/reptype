name: Deploy to Amazon ECS

on:
  pull_request:
    branches:
      - main
    types:
      - closed

permissions:
  contents: read

env:
  AWS_REGION: ap-northeast-1
  ECR_REPOSITORY_APP: rails-reptype
  ECR_REPOSITORY_NGINX: nginx-reptype
  ECS_CLUSTER: reptype-cluster
  ECS_SERVICE: reptype-service
  TASK_DEFINITION: reptype-task
  CONTAINER_NAME_APP: rails
  CONTAINER_NAME_NGINX: nginx

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    if: github.event.pull_request.merged == true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push app image to ECR
        id: build-app
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build \
            -f docker/app/Dockerfile \
            -t $ECR_REGISTRY/$ECR_REPOSITORY_APP:$IMAGE_TAG \
            -t $ECR_REGISTRY/$ECR_REPOSITORY_APP:latest \
            .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY_APP:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY_APP:latest
          echo "image=$ECR_REGISTRY/$ECR_REPOSITORY_APP:$IMAGE_TAG" >> $GITHUB_OUTPUT

      - name: Build, tag, and push nginx image to ECR
        id: build-nginx
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build \
            -f docker/nginx/Dockerfile \
            -t $ECR_REGISTRY/$ECR_REPOSITORY_NGINX:$IMAGE_TAG \
            -t $ECR_REGISTRY/$ECR_REPOSITORY_NGINX:latest \
            ./docker
          docker push $ECR_REGISTRY/$ECR_REPOSITORY_NGINX:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY_NGINX:latest
          echo "image=$ECR_REGISTRY/$ECR_REPOSITORY_NGINX:$IMAGE_TAG" >> $GITHUB_OUTPUT

      - name: Download current task definition
        run: |
          aws ecs describe-task-definition \
            --task-definition ${{ env.TASK_DEFINITION }} \
            --query taskDefinition \
            > task-definition.json

      - name: Update app container image in task definition
        id: render-app
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-definition.json
          container-name: ${{ env.CONTAINER_NAME_APP }}
          image: ${{ steps.build-app.outputs.image }}

      - name: Update nginx container image in task definition
        id: render-nginx
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: ${{ steps.render-app.outputs.task-definition }}
          container-name: ${{ env.CONTAINER_NAME_NGINX }}
          image: ${{ steps.build-nginx.outputs.image }}

      - name: Deploy to Amazon ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.render-nginx.outputs.task-definition }}
          service: ${{ env.ECS_SERVICE }}
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true
