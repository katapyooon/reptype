name: Sync Docs and Run Ingestion

on:
  pull_request:
    branches:
      - main
    types:
      - closed
    paths:
      - 'reptype-chat/docs/**'

permissions:
  contents: read

env:
  AWS_REGION: ap-northeast-1
  ECS_CLUSTER: reptype-cluster
  TASK_DEFINITION: reptype-task
  CONTAINER_NAME_APP: rails

jobs:
  ingestion:
    name: Sync Docs & Ingestion
    runs-on: ubuntu-latest
    if: github.event.pull_request.merged == true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Sync docs to S3
        run: |
          aws s3 sync reptype-chat/docs/ s3://${{ secrets.DOCUMENTS_BUCKET_NAME }}/docs/ \
            --delete \
            --exclude "*.DS_Store"

      - name: Download current task definition
        run: |
          aws ecs describe-task-definition \
            --task-definition ${{ env.TASK_DEFINITION }} \
            --query taskDefinition \
            > task-definition.json

      - name: Run ingestion via ECS run-task
        run: |
          NETWORK_CONFIG=$(aws ecs describe-services \
            --cluster ${{ env.ECS_CLUSTER }} \
            --services reptype-service \
            --query 'services[0].networkConfiguration' \
            --output json)

          aws ecs run-task \
            --cluster ${{ env.ECS_CLUSTER }} \
            --task-definition ${{ env.TASK_DEFINITION }} \
            --launch-type FARGATE \
            --network-configuration "$NETWORK_CONFIG" \
            --overrides "{
              \"containerOverrides\": [{
                \"name\": \"${{ env.CONTAINER_NAME_APP }}\",
                \"command\": [\"bundle\", \"exec\", \"rails\", \"ingestion:run_all\"]
              }]
            }"
