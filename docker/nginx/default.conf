upstream rails_app {
    server localhost:3000;
}

server {
    listen 80;
    server_name _;

    root /rails/public;

    # IP当たり同時接続数の上限
    limit_conn conn_limit 20;

    # 静的アセットはnginxが直接配信（レート制限なし）
    location ^~ /assets/ {
        gzip_static on;
        expires max;
        add_header Cache-Control public;
    }

    # チャットAPI（Bedrock呼び出し）: 1分間5リクエスト、バースト3
    location ~ /chat {
        limit_req zone=chat_api burst=3 nodelay;
        limit_req_status 429;
        try_files $uri @rails;
    }

    # その他のリクエスト: 1分間30リクエスト、バースト10
    location / {
        limit_req zone=global burst=10 nodelay;
        limit_req_status 429;
        try_files $uri @rails;
    }

    location @rails {
        proxy_pass http://rails_app;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
    }
}
